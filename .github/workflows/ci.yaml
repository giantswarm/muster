---
# yamllint disable rule:truthy
name: CI Checks

# Muster-specific checks that are NOT covered by the architect-orb in CircleCI.
# The architect-orb already handles: goimports, gofmt, go test, go build,
# nancy vulnerability scan, and non-ASCII filename checks.
# This workflow covers only the additional checks unique to muster.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Python for yamllint
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.19.4'

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Lint YAML and Helm
        run: make check

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest

      - name: Check CRDs are up to date
        run: |
          make generate-crds
          if ! git diff --quiet helm/muster/crds/; then
            echo "ERROR: CRDs are out of date."
            echo "Run 'make generate-crds' and commit."
            git diff helm/muster/crds/
            exit 1
          fi
          echo "CRDs are up to date."

      - name: Run Helm unit tests
        run: make helm-test

      - name: Build muster binary
        run: make build

      - name: Run muster integration tests
        run: ./muster test --parallel 50 --base-port 30000

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Run Release Dry-Run
        if: github.event_name == 'pull_request'
        run: make release-dry-run-fast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
