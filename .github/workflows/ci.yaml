---
# yamllint disable rule:truthy
# Muster-specific checks not covered by the architect-orb in CircleCI.
# Architect-orb already handles: goimports, gofmt, go test, go build,
# nancy vulnerability scan, and non-ASCII filename checks.
name: CI Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache: true

      - name: Install Python for yamllint
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.21.2'

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Lint YAML and Helm
        run: make check

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@latest

      - name: Check CRDs are up to date
        run: |
          make generate-crds
          if ! git diff --quiet helm/muster-crds/files/crds/; then
            echo "ERROR: CRDs are out of date."
            echo "Run 'make generate-crds' and commit."
            git diff helm/muster-crds/files/crds/
            exit 1
          fi
          echo "CRDs are up to date."

      - name: Run Helm unit tests
        run: make helm-test

      - name: Build muster binary
        run: make build

      - name: Run muster integration tests
        run: ./muster test --parallel 50 --base-port 30000
