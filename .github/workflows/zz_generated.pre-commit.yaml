# This file is maintained centrally at
# https://github.com/giantswarm/github/blob/main/workflows/zz_generated.pre-commit.yaml

name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "2.11.4"
  HELM_VERSION: "3.17.3"
  HELM_DOCS_VERSION: "1.14.2"
  HELM_VALUES_SCHEMA_JSON_VERSION: "2.3.1"

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - name: Check out code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Set up Python environment
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
    - name: Set up Go environment
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '${{ env.GO_VERSION }}'
    - name: Install helm
      uses: giantswarm/install-binary-action@e2730babbc89f02ef1559b042d33cbe24f5c3547 # v4.0.2
      with:
        binary: helm
        version: "${{ env.HELM_VERSION }}"
        download_url: "https://get.helm.sh/helm-v${version}-linux-amd64.tar.gz"
    - name: Install golangci-lint
      uses: giantswarm/install-binary-action@e2730babbc89f02ef1559b042d33cbe24f5c3547 # v4.0.2
      with:
        binary: golangci-lint
        version: "${{ env.GOLANGCI_LINT_VERSION }}"
        download_url: https://github.com/golangci/golangci-lint/releases/download/v${version}/golangci-lint-${version}-linux-amd64.tar.gz
    - name: Install helm-docs
      uses: giantswarm/install-binary-action@e2730babbc89f02ef1559b042d33cbe24f5c3547 # v4.0.2
      with:
        binary: helm-docs
        version: "${{ env.HELM_DOCS_VERSION }}"
        download_url: "https://github.com/norwoodj/helm-docs/releases/download/v${version}/helm-docs_${version}_Linux_x86_64.tar.gz"
        tarball_binary_path: "${binary}"
    - name: Install helm-values-schema-json
      uses: giantswarm/install-binary-action@e2730babbc89f02ef1559b042d33cbe24f5c3547 # v4.0.2
      with:
        binary: helm-schema
        version: "${{ env.HELM_VALUES_SCHEMA_JSON_VERSION }}"
        download_url: "https://github.com/losisin/helm-values-schema-json/releases/download/v${version}/helm-values-schema-json_${version}_linux_amd64.tgz"
        tarball_binary_path: "schema"
        binary_new_name: "${binary}"
    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest
    - name: Execute pre-commit hooks
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
