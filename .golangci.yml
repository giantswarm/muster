version: "2"

linters:
  settings:
    goconst:
      min-len: 5
      min-occurrences: 5
      # ignore-tests skips test files during occurrence COUNTING — needed
      # so test-only string usage doesn't inflate the production count
      # past min-occurrences. The path-based _test.go exclusion below
      # separately silences any test-file goconst reports. Both are
      # required: ignore-tests alone reports nothing on test files but
      # only after counting; the path exclusion alone still lets test
      # occurrences push production strings over the threshold.
      ignore-tests: true
      ignore-functions:
        - logging.Info
        - logging.Debug
        - logging.Warn
        - logging.Error
        - logging.InfoWithAttrs
        - logging.DebugWithAttrs
        - logging.WarnWithAttrs
        - logging.ErrorWithAttrs
        - fmt.Errorf

  exclusions:
    rules:
      # Test fixtures legitimately repeat dummy tokens, fake URLs and table
      # data. goconst's ignore-tests setting only suppresses test-file
      # reporting in the standalone CLI; in golangci-lint v2 the equivalent
      # is a path-based exclusion.
      - path: _test\.go
        linters:
          - gosec
          - goconst
