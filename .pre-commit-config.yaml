# This file is maintained centrally at
# https://github.com/giantswarm/github/blob/main/languages/go/.pre-commit-config.yaml

minimum_pre_commit_version: '2.17'
repos:
  # shell scripts
  - repo: https://github.com/detailyang/pre-commit-shell
    rev: '1.0.5'
    hooks:
      - id: shell-lint
        args: [ --format=json ]
        exclude: ".*\\.template"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ".*testdata/.*"
      - id: mixed-line-ending
      - id: trailing-whitespace
        exclude: ".*testdata/.*"

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy
      - id: golangci-lint
        args:
          - -E=gosec
          - -E=goconst
          - -E=govet
          # timeout is needed for CI
          - --timeout=300s
          # List all issues found
          - --max-same-issues=0
          - --max-issues-per-linter=0
      - id: go-imports
        args: [ -local, github.com/giantswarm/muster ]

  - repo: local
    hooks:
      - id: agentgateway-verify-pin
        name: agentgateway-verify-pin
        description: Fail if internal/agentgateway/version/pin.go drifts from go.mod
        entry: make verify-pin
        language: system
        pass_filenames: false
        files: '^(go\.mod|internal/agentgateway/version/pin\.go)$'
      - id: agentgateway-verify-checksums
        name: agentgateway-verify-checksums
        description: Fail if internal/agentgateway/binary/checksums.go drifts from upstream release .sha256 files (online)
        entry: make verify-checksums
        language: system
        pass_filenames: false
        stages: [manual]
        files: '^(go\.mod|internal/agentgateway/binary/checksums\.go)$'
