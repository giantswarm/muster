version: 2.1

orbs:
  architect: giantswarm/architect@9.0.2

workflows:
  build:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: muster
          architectures: "linux/amd64,linux/arm64"
          filters:
            tags:
              only: /^v.*/

      # split-china-push: true delegates Aliyun to sync-china-registry on
      # tags. Safe on branches: registries-data marks Aliyun push_dev_image=false.
      - architect/push-to-registries:
          context: architect
          multiarch: true
          name: push-to-registries
          split-china-push: true
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner.
      # Runs in parallel with the chart catalog push; an Aliyun mirror failure
      # does NOT block the chart publish.
      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: build-muster-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster
          push_to_appcatalog: false
          push_to_oci_registry: false
          persist_chart_archive: true
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      - architect/run-tests-with-ats:
          name: execute chart tests
          requires:
            - build-muster-chart
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Branch: push chart after tests + amd64 image
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-muster-to-giantswarm-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster
          requires:
            - execute chart tests
            - push-to-registries
          filters:
            branches:
              ignore:
                - main

      # Tag: push chart after tests + the gsoci image. Intentionally does NOT
      # depend on sync-china-registry so the chart catalog can publish even
      # if the in-China Aliyun mirror is slow or fails.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-muster-to-giantswarm-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster
          requires:
            - execute chart tests
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

      # muster-crds: the standalone CRD-only chart. Versioned in lockstep with
      # muster off the same git tag (.abs replace-chart-version-with-git). The
      # same four-job shape as muster: build, ATS tests, branch push, tag push.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: build-muster-crds-chart
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster-crds
          # chart name differs from the repo (muster) — required by the orb's
          # chart-name check to publish a second chart from this repo.
          explicit_allow_chart_name_mismatch: true
          push_to_appcatalog: false
          push_to_oci_registry: false
          persist_chart_archive: true
          requires:
            - go-build
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      - architect/run-tests-with-ats:
          name: execute muster-crds chart tests
          requires:
            - build-muster-crds-chart
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main

      # Branch: push CRD chart after tests + amd64 image
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-muster-crds-to-giantswarm-app-catalog
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster-crds
          explicit_allow_chart_name_mismatch: true
          requires:
            - execute muster-crds chart tests
            - push-to-registries
          filters:
            branches:
              ignore:
                - main

      # Tag: push CRD chart after tests + the gsoci image. Same gating as the
      # muster release push; does NOT depend on sync-china-registry.
      - architect/push-to-app-catalog:
          executor: app-build-suite
          context: architect
          name: push-muster-crds-to-giantswarm-app-catalog-release
          app_catalog: giantswarm-catalog
          app_catalog_test: giantswarm-test-catalog
          chart: muster-crds
          explicit_allow_chart_name_mismatch: true
          requires:
            - execute muster-crds chart tests
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
