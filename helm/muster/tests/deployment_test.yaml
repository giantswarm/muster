# Deployment template tests for muster Helm chart
#
# These tests verify the Deployment configuration, particularly:
# - Projected ServiceAccount tokens (security best practice)
# - Container security context
# - Volume mounts
#
# Run with: helm unittest ./helm/muster

suite: Deployment template tests
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
tests:
  - it: should disable automountServiceAccountToken
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should mount projected ServiceAccount token volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: sa-token
            projected:
              sources:
                - serviceAccountToken:
                    expirationSeconds: 3600
                    path: token
                - configMap:
                    name: kube-root-ca.crt
                    items:
                      - key: ca.crt
                        path: ca.crt
                - downwardAPI:
                    items:
                      - path: namespace
                        fieldRef:
                          fieldPath: metadata.namespace

  - it: should mount sa-token volume in container
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: sa-token
            mountPath: /var/run/secrets/kubernetes.io/serviceaccount
            readOnly: true

  - it: should set read-only root filesystem
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should drop all capabilities
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          value:
            - ALL

  - it: should not allow privilege escalation
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should run as non-root
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should have liveness and readiness probes
    template: templates/deployment.yaml
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should use correct image
    template: templates/deployment.yaml
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "gsoci.azurecr.io/giantswarm/muster:1.2.3"

  - it: should enable debug mode when configured
    template: templates/deployment.yaml
    set:
      muster.debug: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--debug"

  - it: always sets K8S_NODE_NAME via downward API
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: K8S_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName

  - it: omits OTEL env vars when observability.otel.endpoint is empty
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: ""
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_RESOURCE_ATTRIBUTES

  - it: renders OTEL env vars when observability.otel.endpoint is set
    template: templates/deployment.yaml
    set:
      muster.observability.otel.endpoint: "tempo-distributor.tempo.svc:4317"
      muster.observability.otel.headers: "X-Scope-OrgID=giantswarm"
      muster.observability.otel.resourceAttributes: "deployment.environment=glean"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "tempo-distributor.tempo.svc:4317"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: "grpc"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_HEADERS
            value: "X-Scope-OrgID=giantswarm"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_RESOURCE_ATTRIBUTES
            value: "k8s.namespace.name=$(K8S_NAMESPACE),k8s.pod.name=$(K8S_POD_NAME),k8s.node.name=$(K8S_NODE_NAME),deployment.environment=glean"

  - it: omits Prometheus env + container port by default
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_METRICS_EXPORTER
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_PROMETHEUS_PORT
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9464
            protocol: TCP

  - it: renders Prometheus env + container port when metrics.exporter contains prometheus
    template: templates/deployment.yaml
    set:
      muster.observability.metrics.exporter: "prometheus"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_METRICS_EXPORTER
            value: "prometheus"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_PROMETHEUS_HOST
            value: "0.0.0.0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_PROMETHEUS_PORT
            value: "9464"
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9464
            protocol: TCP

  - it: dual-export mode still renders Prometheus surface
    template: templates/deployment.yaml
    set:
      muster.observability.metrics.exporter: "otlp,prometheus"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_METRICS_EXPORTER
            value: "otlp,prometheus"
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9464
            protocol: TCP
