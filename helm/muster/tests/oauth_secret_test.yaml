suite: OAuth secret fail-template gates
templates:
  - templates/oauth-secret.yaml
release:
  name: muster
tests:
  - it: renders with default values (claude.ai allowlist gates the require-token check)
    set:
      muster.oauth.server.enabled: true
      muster.oauth.server.provider: dex
      muster.oauth.server.dex.clientSecret: dummy
      muster.oauth.server.allowPublicClientRegistration: false
      muster.oauth.server.registrationToken: ""
      muster.oauth.server.trustedPublicRegistrationSchemes: []
      muster.oauth.server.trustedPublicRegistrationRedirectURIs:
        - https://claude.ai/api/mcp/auth_callback
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data.registration-token

  - it: renders with registrationToken even if allowlists are empty
    set:
      muster.oauth.server.enabled: true
      muster.oauth.server.provider: dex
      muster.oauth.server.dex.clientSecret: dummy
      muster.oauth.server.allowPublicClientRegistration: false
      muster.oauth.server.registrationToken: "rotate-me"
      muster.oauth.server.trustedPublicRegistrationSchemes: []
      muster.oauth.server.trustedPublicRegistrationRedirectURIs: []
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: data.registration-token

  - it: fails when no token, no public registration, and both allowlists empty
    set:
      muster.oauth.server.enabled: true
      muster.oauth.server.provider: dex
      muster.oauth.server.dex.clientSecret: dummy
      muster.oauth.server.allowPublicClientRegistration: false
      muster.oauth.server.registrationToken: ""
      muster.oauth.server.trustedPublicRegistrationSchemes: []
      muster.oauth.server.trustedPublicRegistrationRedirectURIs: []
    asserts:
      - failedTemplate:
          errorMessage: "muster.oauth.server.registrationToken is required when OAuth is enabled, allowPublicClientRegistration is false, both trustedPublicRegistrationSchemes and trustedPublicRegistrationRedirectURIs are empty, and existingSecret is not set. Set a registrationToken, enable allowPublicClientRegistration, or configure one of the trustedPublicRegistration* allowlists."

  - it: renders when only trustedPublicRegistrationSchemes is set
    set:
      muster.oauth.server.enabled: true
      muster.oauth.server.provider: dex
      muster.oauth.server.dex.clientSecret: dummy
      muster.oauth.server.allowPublicClientRegistration: false
      muster.oauth.server.registrationToken: ""
      muster.oauth.server.trustedPublicRegistrationSchemes:
        - cursor
      muster.oauth.server.trustedPublicRegistrationRedirectURIs: []
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data.registration-token

  - it: renders when only trustedPublicRegistrationRedirectURIs is set
    set:
      muster.oauth.server.enabled: true
      muster.oauth.server.provider: dex
      muster.oauth.server.dex.clientSecret: dummy
      muster.oauth.server.allowPublicClientRegistration: false
      muster.oauth.server.registrationToken: ""
      muster.oauth.server.trustedPublicRegistrationSchemes: []
      muster.oauth.server.trustedPublicRegistrationRedirectURIs:
        - https://claude.ai/api/mcp/auth_callback
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data.registration-token
