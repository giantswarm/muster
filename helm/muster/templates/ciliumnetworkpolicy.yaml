{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "cilium") }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
    {{- with .Values.networkPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "muster.selectorLabels" . | nindent 6 }}

  ingress:
    # Allow traffic from cluster to muster service port
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "{{ .Values.muster.aggregator.port }}"
              protocol: TCP

  egress:
    # Allow DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: coredns
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: k8s-dns-node-cache
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "1053"
              protocol: UDP
            - port: "53"
              protocol: TCP
            - port: "1053"
              protocol: TCP

    # Allow Kubernetes API access
    - toEntities:
        - kube-apiserver

    {{- if .Values.networkPolicy.cilium.allowClusterIngress }}
    # In-cluster services (Dex / OIDC / MCP servers) reached via a ClusterIP
    # whose backend pod listens directly on 80/443. This does NOT cover an
    # ingress gateway that listens on different target ports — see the
    # `ingressGateway` rule below.
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    {{- end }}

    {{- with .Values.networkPolicy.cilium.ingressGateway }}
    # Egress to the in-cluster ingress gateway that fronts Dex/OIDC and HTTP
    # MCP servers (their public URLs resolve to the gateway LoadBalancer VIP).
    #
    # Required when that VIP is a Cilium-managed service IP (LB-IPAM / L2,
    # typical on-prem): with kube-proxy-replacement, Cilium DNATs VIP:443 to the
    # gateway backend pod on its target port (e.g. 10443) BEFORE egress policy
    # is evaluated, so the policy must allow the backend endpoint on that target
    # port — `world`/`cluster` on 443 do not match. When the gateway VIP is an
    # external cloud LB (e.g. AWS ELB), traffic egresses as `world` (covered by
    # the rule below) and this is a harmless no-op; likewise where the selector
    # matches no pods (non-envoy-gateway ingress).
    - toEndpoints:
        - matchLabels:
            {{- toYaml .endpointSelector | nindent 12 }}
      toPorts:
        - ports:
            {{- range .ports }}
            - port: "{{ . }}"
              protocol: TCP
            {{- end }}
    {{- end }}

    # Allow egress to world for remote MCP servers (streamable-http, sse)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP

    # Egress to the agentgateway data-plane for the upstream-proxy path.
    # No-op when agentgateway isn't deployed in the release namespace.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: agentgateway
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP

    {{- if .Values.muster.oauth.server.enabled }}
    {{- if .Values.muster.oauth.server.storage }}
    {{- if eq .Values.muster.oauth.server.storage.type "valkey" }}
    # Allow egress to Valkey for OAuth token storage
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: valkey
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
