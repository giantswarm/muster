{{/*
RBAC Configuration for muster

Muster needs access to:
  - Its own CRDs (MCPServer, Workflow)
  - agentgateway CRs the MCPServer reconciler emits per MCPServer
    (AgentgatewayBackend, AgentgatewayPolicy, HTTPRoute)
  - CRD discovery
  - Events (for core_events tool)
  - Secrets (for reading credentials: token exchange, OAuth)
*/}}

{{- if and .Values.serviceAccount.create .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
rules:
  # Muster CRDs - required for managing MCPServer, Workflow resources
  - apiGroups: ["muster.giantswarm.io"]
    resources: ["mcpservers", "workflows"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Muster CRD status subresources - for updating status fields
  - apiGroups: ["muster.giantswarm.io"]
    resources: ["mcpservers/status", "workflows/status"]
    verbs: ["get", "update", "patch"]

  # agentgateway CRs emitted per MCPServer by the reconciler. Cascade on
  # delete relies on OwnerReferences, so the reconciler also needs
  # create/update/patch to keep the stack in sync.
  - apiGroups: ["agentgateway.dev"]
    resources: ["agentgatewaybackends", "agentgatewaypolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Gateway API HTTPRoute emitted per MCPServer alongside the agentgateway
  # CRs. Same reason as above.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # CRD discovery - for finding available CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # Events - required for the core_events tool
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]

  # Secrets - required for reading credentials (token exchange, OAuth)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "muster.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "muster.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
