{{/*
RBAC Configuration for muster

Muster needs access to:
  - Its own CRDs (MCPServer, Workflow)
  - CRD discovery
  - Events (for core_events tool)
  - Secrets (for reading credentials: token exchange, OAuth)

Secrets access is intentionally scoped to namespaced Roles, not a ClusterRole,
to limit blast radius. By default a Role is created in the release namespace.
Broker target secrets or githubApp.privateKeyRef secrets in other namespaces
require listing those namespaces in rbac.additionalSecretNamespaces.
*/}}

{{- if and .Values.serviceAccount.create .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
rules:
  # Muster CRDs - required for managing MCPServer, Workflow resources
  # and durable WorkflowExecution records.
  - apiGroups: ["muster.giantswarm.io"]
    resources: ["mcpservers", "workflows", "workflowexecutions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Muster CRD status subresources - for updating status fields
  - apiGroups: ["muster.giantswarm.io"]
    resources: ["mcpservers/status", "workflows/status"]
    verbs: ["get", "update", "patch"]

  # CRD discovery - for finding available CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # Events - required for the core_events tool
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "muster.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "muster.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "muster.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "muster.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "muster.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "muster.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

{{- range .Values.rbac.additionalSecretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "muster.fullname" $ }}-secrets
  namespace: {{ . }}
  labels:
    {{- include "muster.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "muster.fullname" $ }}-secrets
  namespace: {{ . }}
  labels:
    {{- include "muster.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "muster.fullname" $ }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "muster.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
