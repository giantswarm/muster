{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.flavor "kubernetes") }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
    {{- with .Values.networkPolicy.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "muster.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.muster.aggregator.port }}
          protocol: TCP
  egress:
    # DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: [kube-dns, coredns, k8s-dns-node-cache]
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 1053
          protocol: UDP
        - port: 1053
          protocol: TCP

    # Kubernetes API
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.kubernetes.apiServerCIDR | quote }}

    {{- with .Values.networkPolicy.kubernetes.clusterCIDR }}
    # In-cluster ingress (Dex / OIDC / MCPServers exposed via LoadBalancer / ClusterIP).
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
    {{- end }}

    # World egress for remote MCP servers. Private ranges excluded.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: {{ toYaml .Values.networkPolicy.kubernetes.worldExcludedCIDRs | nindent 14 }}
      ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP

    # Egress to the agentgateway data-plane for the upstream-proxy path.
    # No-op when agentgateway isn't deployed in the release namespace.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: agentgateway
      ports:
        - port: 8080
          protocol: TCP

    {{- if .Values.muster.oauth.server.enabled }}
    {{- if .Values.muster.oauth.server.storage }}
    {{- if eq .Values.muster.oauth.server.storage.type "valkey" }}
    # Valkey for OAuth session storage.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - port: 6379
          protocol: TCP
    {{- end }}
    {{- end }}
    {{- end }}

    {{- with .Values.networkPolicy.kubernetes.additionalEgress }}
    # Additional in-cluster egress entries supplied via values (e.g. MCP servers
    # on non-80/443 ports). Each item is appended verbatim to the egress list.
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
