apiVersion: v1
kind: Service
metadata:
  name: {{ include "muster.fullname" . }}
  labels:
    {{- include "muster.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if contains "prometheus" (.Values.muster.observability.metrics.exporter | toString) }}
    - port: {{ .Values.muster.observability.metrics.prometheus.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "muster.selectorLabels" . | nindent 4 }}
