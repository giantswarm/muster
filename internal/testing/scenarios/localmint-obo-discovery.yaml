name: "localmint-obo-discovery"
category: "behavioral"
concept: "mcpserver"
description: |
  Regression for the OBO actor-token capture in EstablishConnectionWithLocalMint.
  When a human connects with a Dex JWT as Authorization AND an SA token as
  X-Actor-Token, the SSO bootstrap must use OBO (sub=human, act=SA) for the
  discovery mint so the backend tools become visible. Without capturedActor the
  background keepalive stream falls back to M2M with the human subject, which
  has no workload grant, so the backend returns 401 and tools stay hidden.

  Scenario: human (workload-idp) + SA (workload-idp, sre-agent) → OBO → cluster-b tools visible.
tags: ["oauth", "local-mint", "obo", "aggregator", "tools", "discovery", "regression"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]
    targets:
      cluster-b: "local-mint"
    workload_audiences:
      "system:serviceaccount:kagent:sre-agent": ["cluster-b"]
    actor_delegation_policy:
      - actor_oauth_server_ref: "workload-idp"
        actor_subject: "system:serviceaccount:kagent:*"
        subject_oauth_server_ref: "*"
        subject_subject: "*"

  mcp_servers:
    - name: "cluster-b-backend"
      config:
        type: "streamable-http"
        oauth:
          required: true
          trust_muster_jwks: true
          expected_audience: "cluster-b"
          local_mint:
            audience: "cluster-b"
        tools:
          - name: "whoami"
            description: "A tool exposed only after per-session OBO local-mint connect"
            responses:
              - response:
                  status: "ok"

steps:
  - id: "verify-backend-registered"
    description: "Backend is registered with muster"
    tool: "core_mcpserver_list"
    args: {}
    expected:
      success: true
      contains: ["cluster-b-backend"]
    timeout: "30s"

  - id: "mint-human-token"
    description: "Mint a human Dex-like JWT (sub=alice, email verified)"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "human-token"
      sub: "alice@giantswarm.io"
      extra_claims:
        email: "alice@giantswarm.io"
        email_verified: true
    expected:
      success: true

  - id: "mint-agent-token"
    description: "Mint an SA token for the agent (the OBO actor)"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "agent-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "connect-as-human-with-obo"
    description: |
      Connect to muster with human JWT as Authorization and SA token as
      X-Actor-Token. The SSO bootstrap (EstablishConnectionWithLocalMint)
      must capture the actor token and use it for the discovery mint.
    tool: "test_reconnect_with_obo"
    args:
      token_ref: "human-token"
      actor_token_ref: "agent-token"
    expected:
      success: true

  - id: "backend-tool-visible"
    description: |
      The backend tool is reachable: muster used OBO for the discovery mint
      (capturedActor=SA), the backend accepted the delegation token, and
      capabilities were stored. Fails without the capturedActor fix.
    tool: "x_cluster-b-backend_whoami"
    args: {}
    expected:
      success: true
      contains: ["ok"]
    retry:
      count: 5
      delay: "1s"
