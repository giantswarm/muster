name: "dex-token-forward"
category: "behavioral"
concept: "mcpserver"
description: |
  End-to-end agent OBO flow on the dex-only trust model. Dex (workload-idp
  stand-in) is the sole token issuer: it mints the on-behalf-of token
  (sub=human, act=agent, groups) itself. The agent presents that dex-issued
  token on /mcp; muster validates it against the trusted issuer's JWKS and
  forwards it unchanged to a forwardToken backend, which validates it against
  the SAME issuer's JWKS (never muster's — muster signs nothing) and echoes
  the received claims, proving the delegation chain reaches the backend
  byte-identical. Byte-identical forwarding of the inbound bearer is pinned
  at the unit level (TestHeaderFunc_ForwardsRequestBearer).
tags: ["oauth", "obo", "token-forwarding", "aggregator", "data-plane"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]

  mcp_servers:
    - name: "obo-backend"
      config:
        type: "streamable-http"
        oauth:
          required: true
          trust_issuer_ref: "workload-idp"
          forward_token: true
        tools:
          - name: "whoami"
            description: "Echoes the caller's forwarded token claims"
            echo_token: true
            responses:
              - response:
                  status: "ok"

steps:
  - id: "verify-backend-registered"
    description: "Backend is registered with muster"
    tool: "core_mcpserver_list"
    args: {}
    expected:
      success: true
      contains: ["obo-backend"]
    timeout: "30s"
    retry:
      count: 5
      delay: "1s"

  - id: "mint-dex-obo-token"
    description: |
      Dex mints the on-behalf-of token itself: sub=human, act=agent SA,
      groups. muster plays no part in issuance.
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "obo-token"
      sub: "alice@giantswarm.io"
      email: "alice@giantswarm.io"
      email_verified: true
      groups: ["customer:giantswarm:team-ai"]
      act:
        sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "connect-as-agent"
    description: "Present the dex-issued OBO token as the bearer on /mcp"
    tool: "test_reconnect_with_token"
    args:
      token_ref: "obo-token"
    expected:
      success: true
    retry:
      count: 5
      delay: "1s"

  - id: "backend-receives-forwarded-token"
    description: |
      The backend tool is reachable through the aggregator and echoes the
      claims of the token it received: the forwarded token still carries the
      human subject and the agent act chain, and validated against the DEX
      issuer's JWKS — the backend does not know muster's signing key because
      muster has none.
    tool: "x_obo-backend_whoami"
    args: {}
    expected:
      success: true
      contains:
        - "alice@giantswarm.io"
        - "system:serviceaccount:kagent:sre-agent"
    retry:
      count: 5
      delay: "1s"
