name: "mcpserver-required-audiences-config"
description: "MCPServer.spec.auth.requiredAudiences schema regression: single value, multi-value, and update-replaces-set round-trips through CRUD"
category: "behavioral"
concept: "mcpserver"
tags: ["mcpserver", "create", "oauth", "required-audiences", "regression", "rfc8707"]
timeout: "1m"

# Scope: schema field round-trip only — that the requiredAudiences list
# survives create/get/update with the values preserved in order. The
# aggregation logic itself (muster collecting these across all configured
# MCPServers and adding them as `aud` claims at user auth) is unit-tested
# in TestCollectRequiredAudiences (internal/api/handlers_mcpserver_test.go);
# cross-cluster SSO using exchanged audiences is locked by
# oauth-sso-token-exchange-basic.yaml against a real mock Dex + mock backend.

steps:
- id: "create-with-single-required-audience"
  description: "Create an MCPServer with one requiredAudiences value"
  tool: "core_mcpserver_create"
  args:
    name: "audiences-single"
    type: "streamable-http"
    url: "https://mcp.example.com/v1/mcp"
    auth:
      type: "oauth"
      requiredAudiences:
        - "mcp:cluster-a"
  expected:
    success: true

- id: "verify-single-audience-roundtrips"
  description: "Verify the single requiredAudiences value roundtrips through get"
  tool: "core_mcpserver_get"
  args:
    name: "audiences-single"
  expected:
    success: true
    json_path:
      name: "audiences-single"
    contains:
      - "requiredAudiences"
      - "mcp:cluster-a"

- id: "create-with-multiple-required-audiences"
  description: "Create an MCPServer with multiple requiredAudiences values"
  tool: "core_mcpserver_create"
  args:
    name: "audiences-multi"
    type: "streamable-http"
    url: "https://mcp.example.com/v1/mcp"
    auth:
      type: "oauth"
      requiredAudiences:
        - "mcp:cluster-a"
        - "mcp:cluster-b"
        - "mcp:platform"
  expected:
    success: true

- id: "verify-multiple-audiences-roundtrip"
  description: "Verify all requiredAudiences values are preserved in order"
  tool: "core_mcpserver_get"
  args:
    name: "audiences-multi"
  expected:
    success: true
    contains:
      - "mcp:cluster-a"
      - "mcp:cluster-b"
      - "mcp:platform"

- id: "update-required-audiences"
  description: "Drop one audience and add another via update"
  tool: "core_mcpserver_update"
  args:
    name: "audiences-multi"
    type: "streamable-http"
    url: "https://mcp.example.com/v1/mcp"
    auth:
      type: "oauth"
      requiredAudiences:
        - "mcp:cluster-a"
        - "mcp:replacement"
  expected:
    success: true

- id: "verify-update-applied"
  description: "Verify the updated requiredAudiences set survives the update"
  tool: "core_mcpserver_get"
  args:
    name: "audiences-multi"
  expected:
    success: true
    contains:
      - "mcp:cluster-a"
      - "mcp:replacement"

cleanup:
- id: "cleanup-audiences-single"
  tool: "core_mcpserver_delete"
  args:
    name: "audiences-single"
  expected:
    success: true
  continue_on_failure: true

- id: "cleanup-audiences-multi"
  tool: "core_mcpserver_delete"
  args:
    name: "audiences-multi"
  expected:
    success: true
  continue_on_failure: true
