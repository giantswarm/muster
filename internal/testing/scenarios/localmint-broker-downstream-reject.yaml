name: "localmint-broker-downstream-reject"
category: "behavioral"
concept: "mcpserver"
description: |
  A broker-minted token bound to cluster-c is presented to a backend that only
  accepts the cluster-b audience. The backend must reject it (401) on the
  audience check, proving downstream audience binding is enforced.
tags: ["oauth", "broker", "local-mint", "downstream", "negative", "audience-binding"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]
    targets:
      cluster-b: "local-mint"
      cluster-c: "local-mint"

  mcp_servers:
    - name: "cluster-b-backend"
      config:
        type: "streamable-http"
        oauth:
          required: true
          trust_muster_jwks: true
          expected_audience: "cluster-b"
        tools:
          - name: "whoami"
            description: "Echoes the caller identity"
            echo_token: true
            responses:
              - response:
                  cluster: "cluster-b"

steps:
  - id: "mint-sa-token"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "sa-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "exchange-wrong-audience"
    description: "Mint a token bound to cluster-c"
    tool: "test_broker_token_exchange"
    args:
      subject_token_ref: "sa-token"
      audience: "cluster-c"
      name: "cluster-c-token"
    expected:
      success: true
      contains: ["cluster-c"]

  - id: "call-downstream-rejected"
    description: "Backend for cluster-b must reject a cluster-c token"
    tool: "test_call_protected_mcp"
    args:
      server: "cluster-b-backend"
      tool: "whoami"
      token_ref: "cluster-c-token"
    expected:
      success: false
