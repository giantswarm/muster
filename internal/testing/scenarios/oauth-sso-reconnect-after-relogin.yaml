name: "oauth-sso-reconnect-after-relogin"
category: "behavioral"
concept: "mcpserver"
description: |
  Tests that SSO servers are automatically reconnected by on-demand SSO.
  
  SSO servers are managed automatically -- users don't manually login/logout.
  This scenario verifies:
  1. User authenticates to muster -> SSO server connects automatically
  2. Even after clearing the capability store entry (simulated via logout),
     the on-demand SSO mechanism reconnects the server on the next request
  
  This verifies that the on-demand SSO model correctly re-establishes
  connections when capability store entries are missing.
tags: ["oauth", "sso", "session", "relogin", "token-forwarding", "regression"]
timeout: "2m"

pre_configuration:
  # Mock OAuth server that acts as muster's upstream identity provider
  mock_oauth_servers:
    - name: "relogin-test-idp"
      scopes: ["openid", "profile", "email", "mcp:admin"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "relogin-test-client"
      client_secret: "relogin-test-secret"
      # Enable this as muster's OAuth server for SSO token forwarding
      use_as_muster_oauth_server: true

  # SSO-enabled MCP server that trusts muster's forwarded ID tokens
  mcp_servers:
    - name: "relogin-sso-server"
      config:
        type: "streamable-http"
        oauth:
          required: true
          mock_oauth_server_ref: "relogin-test-idp"
          scope: "mcp:admin"
          # Enable token forwarding - muster should forward its ID token
          forward_token: true
        tools:
          - name: "check_connection"
            description: "Simple tool to verify connection is working"
            responses:
              - response:
                  status: "success"
                  message: "Connection verified"

steps:
  # =========================================================================
  # PHASE 1: Initial Authentication and SSO Connection
  # =========================================================================
  
  # Step 1: Verify OAuth server is running
  - id: verify-oauth-server
    description: "Verify the OAuth server is running"
    tool: "test_get_oauth_server_info"
    args:
      server: "relogin-test-idp"
    expected:
      success: true
      contains:
        - "relogin-test-idp"
        - "issuer_url"

  # Step 2: Verify MCP server is registered
  - id: verify-server-registered
    description: "Verify the MCP server is registered"
    tool: "core_mcpserver_list"
    args: {}
    expected:
      success: true
      contains:
        - "relogin-sso-server"

  # Step 3: Authenticate to muster (simulates `muster auth login`)
  - id: muster-auth-login
    description: "Authenticate to muster via OAuth (stores ID token for SSO)"
    tool: "test_muster_auth_login"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "ID token stored"

  # Step 4: Verify SSO connected the server automatically
  - id: verify-sso-connected
    description: "Verify SSO connected the server after auth"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"

  # Step 5: Verify protected tool works
  - id: verify-connection
    description: "Call protected tool to verify SSO authentication succeeded"
    tool: "x_relogin-sso-server_check_connection"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "Connection verified"

  # =========================================================================
  # PHASE 2: Logout clears cache, on-demand SSO reconnects automatically
  # =========================================================================

  # Step 6: Logout from the SSO server (clears capability store entry)
  - id: logout-from-server
    description: "Logout from SSO server clears cached capabilities"
    tool: "core_auth_logout"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "logged out"

  # Step 7: On the next request, on-demand SSO reconnects automatically.
  # The server should be connected again (not auth_required) because
  # triggerOnDemandSSO fires on every authenticated request.
  - id: verify-auto-reconnect
    description: "Verify on-demand SSO automatically reconnects after logout"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"
