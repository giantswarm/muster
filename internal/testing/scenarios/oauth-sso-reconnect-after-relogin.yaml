name: "oauth-sso-reconnect-after-relogin"
category: "behavioral"
concept: "mcpserver"
description: |
  Tests SSO session lifecycle: login establishes connections, manual logout
  is rejected for SSO servers, and re-login re-establishes connections after
  session revocation.

  SSO connections are established synchronously during the OAuth login flow
  (SessionCreationHandler). Manual logout via core_auth_logout is blocked for
  SSO servers because their lifecycle is managed automatically. To disconnect,
  users must re-authenticate to muster (which revokes the old session and
  creates a new one with fresh SSO connections).
tags: ["oauth", "sso", "session", "relogin", "token-forwarding", "regression"]
timeout: "2m"

pre_configuration:
  # Mock OAuth server that acts as muster's upstream identity provider
  mock_oauth_servers:
    - name: "relogin-test-idp"
      scopes: ["openid", "profile", "email", "mcp:admin"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "relogin-test-client"
      client_secret: "relogin-test-secret"
      use_as_muster_oauth_server: true

  # SSO-enabled MCP server that trusts muster's forwarded ID tokens
  mcp_servers:
    - name: "relogin-sso-server"
      config:
        type: "streamable-http"
        oauth:
          required: true
          mock_oauth_server_ref: "relogin-test-idp"
          forward_token: true
        tools:
          - name: "check_connection"
            description: "Simple tool to verify connection is working"
            responses:
              - response:
                  status: "success"
                  message: "Connection verified"

steps:
  # =========================================================================
  # PHASE 1: Initial Authentication and SSO Connection
  # =========================================================================

  - id: verify-oauth-server
    description: "Verify the OAuth server is running"
    tool: "test_get_oauth_server_info"
    args:
      server: "relogin-test-idp"
    expected:
      success: true
      contains:
        - "relogin-test-idp"
        - "issuer_url"

  - id: verify-server-registered
    description: "Verify the MCP server is registered"
    tool: "core_mcpserver_list"
    args: {}
    expected:
      success: true
      contains:
        - "relogin-sso-server"

  - id: muster-auth-login
    description: "Authenticate to muster via OAuth (stores ID token for SSO)"
    tool: "test_muster_auth_login"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "ID token stored"

  - id: verify-sso-connected
    description: "Verify SSO connected the server during login"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"

  - id: verify-connection
    description: "Call protected tool to verify SSO authentication succeeded"
    tool: "x_relogin-sso-server_check_connection"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "Connection verified"

  # =========================================================================
  # PHASE 2: Manual logout is blocked for SSO servers
  # =========================================================================

  - id: logout-from-sso-server-rejected
    description: "Manual logout from SSO server is rejected"
    tool: "core_auth_logout"
    args:
      server: "relogin-sso-server"
    expected:
      success: false
      contains:
        - "SSO"
        - "not supported"

  - id: verify-still-connected-after-rejected-logout
    description: "SSO server remains connected after rejected logout"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"

  # =========================================================================
  # PHASE 3: Re-login re-establishes SSO connections
  # =========================================================================

  - id: muster-reauth
    description: "Re-authenticate to muster to get a fresh session with SSO"
    tool: "test_muster_auth_login"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "ID token stored"

  - id: verify-reconnected-after-relogin
    description: "Verify SSO server connected in the new session"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"
