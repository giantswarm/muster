name: "oauth-sso-reconnect-after-relogin"
category: "behavioral"
concept: "mcpserver"
description: |
  Tests SSO session lifecycle: login establishes connections, logout clears
  them, and re-login re-establishes them.

  SSO connections are established synchronously during the OAuth login flow
  (SessionCreationHandler). After logout from an individual SSO server the
  capability store entry is removed and the server shows as auth_required.
  A fresh login re-establishes the connection.
tags: ["oauth", "sso", "session", "relogin", "token-forwarding", "regression"]
timeout: "2m"

pre_configuration:
  # Mock OAuth server that acts as muster's upstream identity provider
  mock_oauth_servers:
    - name: "relogin-test-idp"
      scopes: ["openid", "profile", "email", "mcp:admin"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "relogin-test-client"
      client_secret: "relogin-test-secret"
      use_as_muster_oauth_server: true

  # SSO-enabled MCP server that trusts muster's forwarded ID tokens
  mcp_servers:
    - name: "relogin-sso-server"
      config:
        type: "streamable-http"
        oauth:
          required: true
          mock_oauth_server_ref: "relogin-test-idp"
          scope: "mcp:admin"
          forward_token: true
        tools:
          - name: "check_connection"
            description: "Simple tool to verify connection is working"
            responses:
              - response:
                  status: "success"
                  message: "Connection verified"

steps:
  # =========================================================================
  # PHASE 1: Initial Authentication and SSO Connection
  # =========================================================================

  - id: verify-oauth-server
    description: "Verify the OAuth server is running"
    tool: "test_get_oauth_server_info"
    args:
      server: "relogin-test-idp"
    expected:
      success: true
      contains:
        - "relogin-test-idp"
        - "issuer_url"

  - id: verify-server-registered
    description: "Verify the MCP server is registered"
    tool: "core_mcpserver_list"
    args: {}
    expected:
      success: true
      contains:
        - "relogin-sso-server"

  - id: muster-auth-login
    description: "Authenticate to muster via OAuth (stores ID token for SSO)"
    tool: "test_muster_auth_login"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "ID token stored"

  - id: verify-sso-connected
    description: "Verify SSO connected the server during login"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"

  - id: verify-connection
    description: "Call protected tool to verify SSO authentication succeeded"
    tool: "x_relogin-sso-server_check_connection"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "Connection verified"

  # =========================================================================
  # PHASE 2: Logout clears cache, re-login reconnects
  # =========================================================================

  - id: logout-from-server
    description: "Logout from SSO server clears cached capabilities"
    tool: "core_auth_logout"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "logged out"

  # After logout, the SSO server is no longer connected for this session.
  # SSO connections are only established during login, not on every request.
  - id: verify-disconnected-after-logout
    description: "Verify server shows as auth_required after logout"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "auth_required"

  # Re-login re-establishes SSO connections via SessionCreationHandler.
  - id: muster-reauth
    description: "Re-authenticate to muster to re-establish SSO"
    tool: "test_muster_auth_login"
    args: {}
    expected:
      success: true
      contains:
        - "success"
        - "ID token stored"

  - id: verify-reconnected-after-relogin
    description: "Verify SSO server reconnected after re-login"
    tool: "test_read_auth_status"
    args:
      server: "relogin-sso-server"
    expected:
      success: true
      contains:
        - "relogin-sso-server"
        - "connected"
