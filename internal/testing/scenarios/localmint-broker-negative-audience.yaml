name: "localmint-broker-negative-audience"
category: "behavioral"
concept: "mcpserver"
description: |
  Negative self-issued local-mint path. The exchange requests resource cluster-c,
  which is not a configured local-mint target (only cluster-b is), so it falls
  outside mcp-oauth's TokenExchangeAllowedResources. muster must reject it with
  the OAuth error invalid_target and mint no token.
tags: ["oauth", "broker", "local-mint", "negative", "token-exchange", "rfc8693"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]
    targets:
      cluster-b: "local-mint"

steps:
  - id: "mint-sa-token"
    description: "Mint a workload SA subject token"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "sa-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "exchange-disallowed-resource"
    description: "Request a resource that is not a configured local-mint target"
    tool: "test_broker_token_exchange"
    args:
      subject_token_ref: "sa-token"
      resource: "cluster-c"
    expected:
      success: false
      error_contains:
        - "invalid_target"
