name: "localmint-broker-m2m-claims"
category: "behavioral"
concept: "mcpserver"
description: |
  M2M (machine-to-machine) local-mint broker path. A workload ServiceAccount
  token is exchanged at muster's /oauth/token broker with no actor and no client
  credentials (the workload exchange path). A workload group grant authorizes the
  SA to request the cluster-b audience and injects an impersonated identity.

  Asserts the minted token's sub equals the configured impersonated user (the
  granted subject), its aud equals the requested audience, and its signature
  verifies against muster's JWKS.
tags: ["oauth", "broker", "local-mint", "m2m", "token-exchange", "rfc8693"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    # muster's own OAuth server (Dex provider). The broker config is layered onto
    # oauth.server, so a use_as_muster_oauth_server entry is required.
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    # The issuer of the workload SA tokens. Referenced as a broker trusted issuer,
    # so it is automatically forced to sign tokens and serve TLS + JWKS.
    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]
    targets:
      cluster-b: "local-mint"
    workload_group_grants:
      - oauth_server_ref: "workload-idp"
        subject: "system:serviceaccount:kagent:sre-agent"
        audiences: ["cluster-b"]
        granted_subject: "sre-impersonator@giantswarm.io"
        granted_groups: ["customer:giantswarm:admins"]

steps:
  - id: "mint-sa-token"
    description: "Mint a workload SA subject token on the trusted issuer"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "sa-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true
      contains: ["sre-agent"]

  - id: "exchange-m2m"
    description: "Exchange the SA token for a cluster-b token (workload path, no actor)"
    tool: "test_broker_token_exchange"
    args:
      subject_token_ref: "sa-token"
      audience: "cluster-b"
    expected:
      success: true
      contains:
        - "sre-impersonator@giantswarm.io"  # minted sub == granted (impersonated) user
        - "cluster-b"                        # minted aud == requested audience
        - "customer:giantswarm:admins"       # granted groups injected
