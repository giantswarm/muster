name: "mcpserver-suspended-resumed"
description: "MCPServer.spec.suspended pause/resume cycle: applied → suspended → resumed → suspended (idempotent) → resumed (idempotent), asserting Disconnected/Connected and a no-op suspend when already suspended."
category: "behavioral"
concept: "mcpserver"
tags: ["mcpserver", "suspended", "lifecycle", "core-api"]
timeout: "2m"

pre_configuration:
  mcp_servers:
    - name: "static-svc"
      config:
        type: "streamable-http"
        tools:
          - name: "ping"
            input_schema:
              type: "object"
              properties: {}
            responses:
              - response:
                  status: "ok"

steps:
  - id: "verify-initial-connected"
    tool: "core_mcpserver_get"
    args:
      name: "static-svc"
    expected:
      success: true
      json_path:
        name: "static-svc"
        state: "Connected"

  - id: "suspend-running-mcpserver"
    tool: "core_mcpserver_update"
    args:
      name: "static-svc"
      suspended: true
    expected:
      success: true

  - id: "verify-disconnected-after-suspend"
    tool: "core_mcpserver_get"
    args:
      name: "static-svc"
    expected:
      success: true
      wait_for_state: "30s"
      json_path:
        name: "static-svc"
        state: "Disconnected"
        suspended: true

  - id: "suspend-already-suspended"
    tool: "core_mcpserver_update"
    args:
      name: "static-svc"
      suspended: true
    expected:
      success: true

  - id: "resume-suspended-mcpserver"
    tool: "core_mcpserver_update"
    args:
      name: "static-svc"
      suspended: false
    expected:
      success: true

  - id: "verify-connected-after-resume"
    tool: "core_mcpserver_get"
    args:
      name: "static-svc"
    expected:
      success: true
      wait_for_state: "30s"
      json_path:
        name: "static-svc"
        state: "Connected"

  - id: "resume-already-running"
    tool: "core_mcpserver_update"
    args:
      name: "static-svc"
      suspended: false
    expected:
      success: true

cleanup:
  - id: "delete-static-svc"
    description: "Delete the test MCPServer so parallel scenarios don't see a leak"
    tool: "core_mcpserver_delete"
    args:
      name: "static-svc"
    expected:
      success: true
    continue_on_failure: true
