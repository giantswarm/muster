name: "localmint-broker-m2m-downstream"
category: "behavioral"
concept: "mcpserver"
description: |
  End-to-end downstream acceptance of an M2M broker-minted token. A workload SA
  token is exchanged for a cluster-b token, which is then presented to a protected
  mock MCP backend configured to trust muster's JWKS for the cluster-b audience.
  The backend validates the signature + audience, accepts the call, and echoes the
  token's claims, proving the minted token is accepted by a real downstream.
tags: ["oauth", "broker", "local-mint", "m2m", "downstream", "acceptance"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]
    targets:
      cluster-b: "local-mint"
    workload_group_grants:
      - oauth_server_ref: "workload-idp"
        subject: "system:serviceaccount:kagent:sre-agent"
        audiences: ["cluster-b"]
        granted_subject: "sre-impersonator@giantswarm.io"
        granted_groups: ["customer:giantswarm:admins"]

  mcp_servers:
    - name: "cluster-b-backend"
      config:
        type: "streamable-http"
        oauth:
          required: true
          trust_muster_jwks: true
          expected_audience: "cluster-b"
        tools:
          - name: "whoami"
            description: "Echoes the caller's broker-minted identity"
            echo_token: true
            responses:
              - response:
                  cluster: "cluster-b"

steps:
  - id: "mint-sa-token"
    description: "Mint a workload SA subject token"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "sa-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "exchange-m2m"
    description: "Exchange for a cluster-b token"
    tool: "test_broker_token_exchange"
    args:
      subject_token_ref: "sa-token"
      audience: "cluster-b"
      name: "cluster-b-token"
    expected:
      success: true
      contains: ["sre-impersonator@giantswarm.io", "cluster-b"]

  - id: "call-downstream"
    description: "Present the minted token to the protected backend"
    tool: "test_call_protected_mcp"
    args:
      server: "cluster-b-backend"
      tool: "whoami"
      token_ref: "cluster-b-token"
    expected:
      success: true
      contains:
        - "sre-impersonator@giantswarm.io"  # backend echoes the minted sub
        - "cluster-b"
