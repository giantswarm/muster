name: "dex-token-forward-deny"
category: "behavioral"
concept: "mcpserver"
description: |
  Deny paths of the dex-only trust model. muster never signs tokens: the
  RFC 8693 exchange at /oauth/token refuses to issue even for a subject from
  a trusted issuer, so no muster-signed token can ever exist. A token from an
  issuer muster does not trust is refused as a bearer on /mcp, so nothing is
  ever forwarded downstream.
tags: ["oauth", "obo", "token-forwarding", "negative"]
timeout: "2m"

pre_configuration:
  mock_oauth_servers:
    - name: "muster-idp"
      scopes: ["openid", "profile", "email", "groups"]
      auto_approve: true
      pkce_required: false
      token_lifetime: "1h"
      client_id: "muster-client"
      client_secret: "muster-secret"
      use_as_muster_oauth_server: true

    - name: "workload-idp"

    - name: "rogue-idp"
      sign_tokens: true

  muster_broker:
    trusted_issuers:
      - oauth_server_ref: "workload-idp"
        accepted_typ_headers: [""]

steps:
  - id: "mint-trusted-token"
    description: "Mint a token on the trusted workload issuer"
    tool: "test_mint_token"
    args:
      server: "workload-idp"
      name: "trusted-token"
      sub: "system:serviceaccount:kagent:sre-agent"
    expected:
      success: true

  - id: "mint-refused"
    description: |
      muster is not an IdP: the exchange refuses to issue a token even for a
      subject from a trusted issuer, because muster has no signing key and
      JWT issuance is permanently disabled.
    tool: "test_broker_token_exchange"
    args:
      subject_token_ref: "trusted-token"
    expected:
      success: false
      error_contains:
        - "invalid_grant"

  - id: "mint-rogue-token"
    description: "Mint a token on an issuer muster does not trust"
    tool: "test_mint_token"
    args:
      server: "rogue-idp"
      name: "rogue-token"
      sub: "mallory@example.com"
    expected:
      success: true

  - id: "mcp-denied"
    description: "/mcp refuses the untrusted bearer; no session is established"
    tool: "test_reconnect_with_token"
    args:
      token_ref: "rogue-token"
    expected:
      success: false
      error_contains:
        - "reconnect with token failed"
