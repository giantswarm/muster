# yaml-language-server: $schema=https://raw.githubusercontent.com/agentgateway/agentgateway/refs/tags/v1.2.1/schema/config.json
binds:
  - port: 8080
    listeners:
      - name: muster
        routes:
          - name: muster
            matches:
              - path:
                  pathPrefix: /mcp/muster
            backends:
              - mcp:
                  targets:
                    - name: muster
                      mcp:
                        host: 127.0.0.1
                        port: 8090
                        path: /mcp
            policies:
              backendAuth:
                passthrough: {}
