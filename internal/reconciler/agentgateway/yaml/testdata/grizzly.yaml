# yaml-language-server: $schema=https://raw.githubusercontent.com/agentgateway/agentgateway/refs/tags/v1.2.1/schema/config.json
binds:
  - port: 8080
    listeners:
      - name: muster
        routes:
          - name: grizzly
            matches:
              - path:
                  pathPrefix: /mcp/grizzly
            backends:
              - mcp:
                  targets:
                    - name: grizzly
                      mcp:
                        host: grizzly.muster.svc.cluster.local
                        port: 8443
                        path: /mcp
            policies:
              backendAuth:
                passthrough: {}
